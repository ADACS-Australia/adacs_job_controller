stages:
  - lint
  - test
  - release

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/src/.cargo"

rustfmt:
  stage: lint
  image: rust:latest
  cache:
    key: "$CI_COMMIT_REF_SLUG-cargo"
    paths:
      - src/.cargo/
      - src/target/
      - src/Cargo.lock
  before_script:
    - rustup component add rustfmt
  script:
    - cd src
    - cargo fmt -- --check

clippy:
  stage: lint
  image: rust:latest
  cache:
    key: "$CI_COMMIT_REF_SLUG-cargo"
    paths:
      - src/.cargo/
      - src/target/
      - src/Cargo.lock
  before_script:
    - rustup component add clippy
  script:
    - cd src
    - cargo clippy --all-targets -- -D warnings

test-and-coverage:
  stage: test
  image: rust:latest
  cache:
    key: "$CI_COMMIT_REF_SLUG-cargo"
    paths:
      - src/.cargo/
      - src/target/
      - src/Cargo.lock
  before_script:
    - apt-get update && apt-get install -y jq
    - |
      if ! command -v rustc &> /dev/null; then
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        source "$HOME/.cargo/env"
      fi
    - rustup component add llvm-tools
    - cargo install cargo-llvm-cov
  script:
    - cd src
    # Run tests with coverage instrumentation (parallel execution)
    - cargo llvm-cov --html
    # Generate cobertura XML for GitLab coverage report
    - cargo llvm-cov --cobertura --output-path cobertura.xml
    # Generate JSON for parsing coverage percentage (single run, no need to run tests twice)
    - cargo llvm-cov --json --output-path coverage.json
    # Extract and display coverage summary
    - |
      echo "=== Coverage Report ==="
      jq -r '"Line Coverage: \(.data[].totals.lines.percent)%"' coverage.json
      jq -r '"Function Coverage: \(.data[].totals.functions.percent)%"' coverage.json
      jq -r '"Region Coverage: \(.data[].totals.regions.percent)%"' coverage.json
      # Output for GitLab coverage regex
      LINE_COV=$(jq -r '.data[].totals.lines.percent' coverage.json)
      echo "TOTAL ${LINE_COV}% covered"
  coverage: '/TOTAL\s+(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: src/cobertura.xml
    paths:
      - src/target/llvm-cov/html/
      - src/cobertura.xml
      - src/coverage.json
    expire_in: 30 days

release:
  stage: release
  image: rust:latest
  cache:
    key: "$CI_COMMIT_REF_SLUG-cargo"
    paths:
      - src/.cargo/
      - src/target/
      - src/Cargo.lock
  needs:
    - test-and-coverage
  script:
    - cd src
    - ./build_release.sh
    - echo "=== Verifying binary ==="
    - ldd target/release/adacs_job_controller || true
    - echo "=== Binary size ==="
    - ls -lh target/release/adacs_job_controller
