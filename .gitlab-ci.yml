variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375/
  DOCKER_DRIVER: overlay2

stages:
  - lint
  - test

# Lint: rustfmt check + clippy
lint:
  stage: lint
  image: rust:latest
  before_script:
    - rustup component add rustfmt clippy
  script:
    - cd src
    - cargo fmt -- --check
    - cargo clippy --all-targets -- -D warnings

# Tests with coverage
tests:
  stage: test
  image: docker/compose:latest
  services:
    - name: docker:20.10.17-dind
  before_script:
    - docker info
  script:
    - cd src
    - docker compose -f docker/docker-compose.yaml -f docker/docker-compose.test.yaml build
    - docker compose -f docker/docker-compose.yaml -f docker/docker-compose.test.yaml up --abort-on-container-exit --exit-code-from web
  after_script:
    - cd src
    - docker compose -f docker/docker-compose.yaml -f docker/docker-compose.test.yaml down -v --remove-orphans || true
  artifacts:
    when: always
    paths:
      - src/test_report/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: src/test_report/coverage.xml
      junit: src/test_report/junit.xml

